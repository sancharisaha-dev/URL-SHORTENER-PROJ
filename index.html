<!DOCTYPE html>
    <html>
      <head>
        <title>URL Shortener</title>
        <style>
          body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 0 16px;
            line-height: 1.5;
          }

          form {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
          }

          input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
          }

          button {
            padding: 10px 14px;
            font-size: 16px;
            cursor: pointer;
          }

          a {
            color: #075985;
          }

          .link-row {
            padding: 10px 0;
            border-top: 1px solid #ddd;
          }
        </style>
      </head>
      <body>
        <h1>URL Shortener</h1>

        <form method="POST" action="/shorten">
          <input
            type="url"
            name="longUrl"
            placeholder="Paste a long URL"
            required
          />
          <button type="submit">Shorten</button>
        </form>

        <h2>Shortened Links</h2>
        ${renderLinks(req)}
      </body>
    </html>
